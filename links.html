<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Links</title>

  <!-- Google Fonts （display=swap で即座にテキスト表示） -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Noto+Serif+JP:wght@400;500;700&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/home.css">
  <link rel="stylesheet" href="css/gallery.css">
  <link rel="stylesheet" href="css/character.css">
  <link rel="stylesheet" href="css/links.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/bg.css">
</head>

<body>

  <div id="bg"></div>

  <script>
    fetch("./bg.html")
      .then(res => res.text())
      .then(html => {
        const bg = document.getElementById("bg");
        bg.style.opacity = "0";
        bg.innerHTML = html;
        requestAnimationFrame(() => {
          bg.style.transition = "opacity 0.4s ease";
          bg.style.opacity = "1";
        });
      });
  </script>

  <!-- ナビバー -->
  <header class="topbar">
    <div class="topbar-left">
      <img src="logo.png" alt="logo" class="logo-img">
      <a href="index.html" class="logo">WebProfile</a>
    </div>
    <nav class="topbar-right">
      <a href="index.html">Home</a>
      <a href="character.html">Character</a>
      <a href="gallery.html">Gallery</a>
      <a href="links.html" class="active">Links</a>
    </nav>
  </header>


  <main class="container" style="padding: 0 16px 120px;">

    <div class="page-title">
      <h1>Links</h1>
      <p>SNS & External Links</p>
    </div>

    <section class="card" style="max-width: 480px; margin: 0 auto 16px;">
      <h2>Social Links</h2>
      <div class="link-list">
        <a href="https://x.com/" target="_blank" class="link-btn">X (Twitter)</a>
        <a href="https://youtube.com/" target="_blank" class="link-btn">YouTube</a>
        <a href="https://discord.com/" target="_blank" class="link-btn">Discord</a>
        <a href="https://drive.google.com/" target="_blank" class="link-btn">Google Drive</a>
      </div>
    </section>

  </main>
  <div id="cursor-glow"></div>
  <script src="js/bg.js"></script>



</body>

</html>
