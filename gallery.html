<!DOCTYPE html>
<html lang="ja">

<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Gallery</title>

     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Noto+Serif+JP:wght@400;500;700&display=swap"
          rel="stylesheet">

     <link rel="stylesheet" href="css/base.css">
     <link rel="stylesheet" href="css/home.css">
     <link rel="stylesheet" href="css/gallery.css">
     <link rel="stylesheet" href="css/character.css">
     <link rel="stylesheet" href="css/links.css">
     <link rel="stylesheet" href="css/responsive.css">
     <link rel="stylesheet" href="css/bg.css">
</head>

<body>

     <div id="bg"></div>

     <script>
          // bg.html 読み込み【即座】
          fetch("./bg.html")
               .then(res => {
                    if (!res.ok) throw new Error(`Failed to load bg.html: ${res.status}`);
                    return res.text();
               })
               .then(html => {
                    const bg = document.getElementById("bg");
                    bg.style.opacity = "0";
                    bg.innerHTML = html;
                    requestAnimationFrame(() => {
                         bg.style.transition = "opacity 0.4s ease";
                         bg.style.opacity = "1";
                    });
               })
               .catch(err => {
                    console.warn("Background load failed:", err);
               });
     </script>

     <!-- ヘッダー -->
     <header class="topbar">
          <div class="topbar-left">
               <img src="logo.png" alt="logo" class="logo-img">
               <a href="index.html" class="logo">WebProfile</a>
          </div>
          <nav class="topbar-right">
               <a href="index.html">Home</a>
               <a href="character.html">Character</a>
               <a href="gallery.html" class="active">Gallery</a>
               <a href="links.html">Links</a>
          </nav>
     </header>

     <!-- メインコンテンツ -->
     <main class="container">
          <!-- 画像はJSで動的に生成 -->
          <div class="gallery" id="gallery"></div>
     </main>

     <!-- モーダル -->
     <div class="modal" id="modal">
          <span class="close" id="modalClose">&times;</span>
          <button class="modal-nav modal-prev" id="modalPrev">&#8249;</button>
          <img class="modal-content" id="modalImg">
          <button class="modal-nav modal-next" id="modalNext">&#8250;</button>
     </div>

     <!-- 隠し管理者入口 -->
     <div id="admin-trigger"></div>

     <!-- パスワード入力ダイアログ -->
     <div id="admin-dialog">
          <div id="admin-dialog-box">
               <p>パスワードを入力</p>
               <input type="password" id="admin-password-input" placeholder="password">
               <div id="admin-dialog-buttons">
                    <button id="admin-cancel">キャンセル</button>
                    <button id="admin-submit">入力</button>
               </div>
               <p id="admin-error"></p>
          </div>
     </div>

     <script src="js/gallery.js"></script>
     <script src="js/admin_trigger.js"></script>
     <div id="cursor-glow"></div>
     <script src="js/bg.js"></script>

</body>

</html>
