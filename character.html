<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Character</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Noto+Serif+JP:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/home.css">
  <link rel="stylesheet" href="css/gallery.css">
  <link rel="stylesheet" href="css/character.css">
  <link rel="stylesheet" href="css/links.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/bg.css">
</head>

<body>

  <div id="bg"></div>

  <script>
    fetch("./bg.html")
      .then(res => {
        if (!res.ok) throw new Error(`Failed to load bg.html: ${res.status}`);
        return res.text();
      })
      .then(html => {
        const bg = document.getElementById("bg");
        bg.style.opacity = "0";
        bg.innerHTML = html;
        requestAnimationFrame(() => {
          bg.style.transition = "opacity 0.4s ease";
          bg.style.opacity = "1";
        });
      })
      .catch(err => console.warn("Background load failed:", err));
  </script>

  <header class="topbar">
    <div class="topbar-left">
      <img src="logo.png" alt="logo" class="logo-img">
      <a href="index.html" class="logo">WebProfile</a>
    </div>
    <nav class="topbar-right">
      <a href="index.html">Home</a>
      <a href="character.html" class="active">Character</a>
      <a href="gallery.html">Gallery</a>
      <a href="links.html">Links</a>
    </nav>
  </header>

  <!-- キャラクタータブ -->
  <div class="character-tabs">
    <button class="character-tab active" data-chara="1">キャラ1</button>
    <button class="character-tab" data-chara="2">キャラ2</button>
  </div>

  <!-- キャラクター1 -->
  <div class="chara-section" id="chara-1">
    <section class="about-profile">
      <img src="https://picsum.photos/300?1" class="about-icon" alt="character1">
      <div class="about-text">
        <h2>キャラ1の名前</h2>
        <p>キャラ1の説明がここに入る</p>
      </div>
    </section>
    <section class="fanart-section">
      <h2>Fan Art</h2>
      <div class="fan-grid" id="fan-grid-1">
        <p style="color:rgba(255,255,255,0.5)">読み込み中...</p>
      </div>
    </section>
  </div>

  <!-- キャラクター2 -->
  <div class="chara-section" id="chara-2" style="display:none">
    <section class="about-profile">
      <img src="https://picsum.photos/300?2" class="about-icon" alt="character2">
      <div class="about-text">
        <h2>キャラ2の名前</h2>
        <p>キャラ2の説明がここに入る</p>
      </div>
    </section>
    <section class="fanart-section">
      <h2>Fan Art</h2>
      <div class="fan-grid" id="fan-grid-2">
        <p style="color:rgba(255,255,255,0.5)">読み込み中...</p>
      </div>
    </section>
  </div>

  <div id="cursor-glow"></div>
  <script src="js/bg.js"></script>
  <script src="js/character.js"></script>

</body>
</html>
