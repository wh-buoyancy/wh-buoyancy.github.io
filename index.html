<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal</title>

  <!-- Google Fonts （display=swap で即座にテキスト表示） -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Noto+Serif+JP:wght@400;500;700&display=swap"
    rel="stylesheet">
  <!-- CSS -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/home.css">
  <link rel="stylesheet" href="css/gallery.css">
  <link rel="stylesheet" href="css/character.css">
  <link rel="stylesheet" href="css/links.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/bg.css">
</head>

<body>

  <div id="bg"></div>

  <script>
    // bg.html 読み込み【即座】
    fetch("./bg.html")
      .then(res => {
        if (!res.ok) throw new Error(`Failed to load bg.html: ${res.status}`);
        return res.text();
      })
      .then(html => {
        const bg = document.getElementById("bg");
        bg.style.opacity = "0";
        bg.innerHTML = html;
        requestAnimationFrame(() => {
          bg.style.transition = "opacity 0.4s ease";
          bg.style.opacity = "1";
        });
      })
      .catch(err => {
        console.warn("Background load failed:", err);
      });
  </script>

  <!-- ナビバー -->
  <header class="topbar">
    <div class="topbar-left">
      <img src="logo.png" alt="logo" class="logo-img">
      <a href="index.html" class="logo">WebProfile</a>
    </div>
    <nav class="topbar-right">
      <a href="index.html" class="active">Home</a>
      <a href="character.html">Character</a>
      <a href="gallery.html">Gallery</a>
      <a href="links.html">Links</a>
    </nav>
  </header>

  <!-- プロフィール -->
  <section class="profile">
    <div class="profile-header">
      <img src="https://picsum.photos/1200/300" alt="banner">
    </div>

    <img class="avatar" src="https://picsum.photos/200" alt="avatar">

    <div class="profile-body">
      <div class="profile-main">
        <div class="profile-top">
          <div>
            <h2 class="name">Test User</h2>
            <p class="id">@id_dev</p>
          </div>
          <span class="badge">Next ▶ Event</span>
        </div>
        <p class="bio">ここに自己紹介</p>
      </div>
    </div>
  </section>

  <!-- Xポスト -->
  <section class="tweet-card">
    <blockquote class="twitter-tweet" data-theme="dark">
      <p lang="ja" dir="ltr">テスト用ポストです</p>
      &mdash; Test User (@test)
      <a href="https://x.com/Pokemon/status/2059651366306402401"></a>
    </blockquote>
  </section>


  <!-- Twitter Widget （遅延読み込み） -->
  <script defer src="https://platform.twitter.com/widgets.js"></script>


  <div id="cursor-glow"></div>
  <script src="js/bg.js"></script>
</body>

</html>
